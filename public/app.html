<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>플래시카드</title>
<style>
:root{
  --desk:#2B3A4A; --desk-deep:#22303D; --paper:#FBFAF7; --ink:#1E242B;
  --hl:#FFE34D; --wrong:#D64550; --right:#2E75B6; --muted:#7A8694; --line:#E4E0D6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
  background:linear-gradient(160deg,var(--desk) 0%,var(--desk-deep) 100%);
  color:var(--ink); display:flex; flex-direction:column; align-items:center;
  min-height:100dvh; padding:14px 14px 20px;
}
.app{width:100%;max-width:560px;display:flex;flex-direction:column;flex:1;min-height:0}
.topbar{display:flex;align-items:center;gap:8px;color:#DDE5EC;margin-bottom:10px}
.topbar h1{font-size:15px;font-weight:800;letter-spacing:-.3px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{background:rgba(255,255,255,.12);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:700;white-space:nowrap}
.pill b{color:var(--hl)}
button.iconbtn{background:rgba(255,255,255,.12);border:none;color:#DDE5EC;border-radius:99px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.progress{height:5px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-bottom:14px}
.progress i{display:block;height:100%;background:var(--hl);width:0%;transition:width .3s ease;border-radius:99px}
.card{
  background:var(--paper); border-radius:18px; flex:1; min-height:0;
  box-shadow:0 14px 34px rgba(0,0,0,.35), 0 2px 0 rgba(255,255,255,.06) inset;
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gcol,#B9C2CC)}
.cardhead{display:flex;align-items:center;gap:8px;padding:16px 18px 0 22px;flex-wrap:wrap}
.badge{font-size:12px;font-weight:900;color:#fff;border-radius:6px;padding:3px 9px;background:var(--gcol,#8B97A3)}
.badge.dim{background:#C7CDD4;color:#5B6672}
.theme{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px}
.weakchip{font-size:11px;font-weight:900;color:#fff;background:var(--wrong);border-radius:99px;padding:2.5px 9px}
.qno{margin-left:auto;font-size:12px;font-weight:800;color:var(--muted)}
.qscroll{flex:1;overflow-y:auto;padding:12px 20px 16px 22px}
.qtext{font-size:17.5px;line-height:1.62;font-weight:600;word-break:keep-all;white-space:pre-wrap}
.qtext mark{background:linear-gradient(transparent 42%,var(--hl) 42%);padding:0 2px;border-radius:2px}
.src{margin-top:10px;font-size:12px;color:var(--muted);font-weight:700}
.concept{display:none;background:#FFF9DE;border:1.5px solid #EFDD8F;border-radius:12px;padding:14px 16px;margin-bottom:4px}
.concept.show{display:block;animation:rise .28s ease}
.concept .clabel{font-size:12px;font-weight:900;color:#8A7B1E;letter-spacing:.5px;margin-bottom:6px}
.concept .cbody{font-size:15.5px;line-height:1.66;font-weight:600;word-break:keep-all}
.result{border-top:1.5px dashed var(--line);padding:14px 20px 16px 22px;display:none;animation:rise .28s ease}
.result.show{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.verdict{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.verdict .mark{font-size:22px;font-weight:900}
.verdict.ok .mark{color:var(--right)} .verdict.no .mark{color:var(--wrong)}
.verdict .anslabel{font-size:14px;font-weight:800}
.anschip{font-size:14px;font-weight:900;border-radius:8px;padding:2px 10px;color:#fff}
.anschip.O{background:var(--right)} .anschip.X{background:var(--wrong)} .anschip.etc{background:#5B6672}
.exp{font-size:14.5px;line-height:1.66;word-break:keep-all}
.exp .trap{color:var(--wrong);font-weight:800}
.exp .trap mark{background:linear-gradient(transparent 40%,var(--hl) 40%);padding:0 2px;border-radius:2px;color:var(--wrong)}
.exp .fix{color:var(--right)} .exp .fix b{font-weight:900}
.controls{margin-top:14px}
.oxrow{display:flex;gap:12px}
.oxrow button{flex:1;border:none;border-radius:16px;padding:20px 0;font-size:30px;font-weight:900;cursor:pointer;color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.25);transition:transform .06s ease}
.oxrow button:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
.btnO{background:var(--right)} .btnX{background:var(--wrong)}
.numrow{display:flex;gap:8px}
.numrow button{flex:1;border:none;border-radius:14px;padding:16px 0;font-size:19px;font-weight:900;color:#fff;background:#5B6672;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.25)}
.numrow button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.25)}
.studybtn{width:100%;border:none;border-radius:16px;padding:20px 0;font-size:17px;font-weight:900;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.25);display:none}
.studybtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
.nextbtn{width:100%;border:none;border-radius:16px;padding:18px 0;font-size:17px;font-weight:900;cursor:pointer;background:var(--hl);color:#3B3400;box-shadow:0 6px 0 rgba(0,0,0,.25);display:none}
.nextbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.25)}
.done{display:none;flex:1;background:var(--paper);border-radius:18px;padding:30px 24px;text-align:center;box-shadow:0 14px 34px rgba(0,0,0,.35);overflow-y:auto}
.done h2{font-size:22px;font-weight:900;margin-bottom:8px}
.done .score{font-size:46px;font-weight:900;margin:10px 0 4px}
.done .score small{font-size:18px;color:var(--muted)}
.done p{color:var(--muted);font-size:14px;font-weight:600;margin-bottom:18px}
.done .btns{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto 20px}
.done button{border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer}
.done .retryWrong{background:var(--wrong);color:#fff}
.done .restart{background:var(--ink);color:#fff}
.done .nextch{background:var(--right);color:#fff;display:none}
.histbox{max-width:340px;margin:0 auto;text-align:left}
.histbox h4{font-size:13px;font-weight:900;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.hrow{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:7px 10px;border-radius:10px;background:#F1EEE5;margin-bottom:6px}
.hrow .hn{font-weight:900;color:var(--muted)}
.hrow .hr8{margin-left:auto;font-weight:900}
.hrow .hw{color:var(--wrong)}
.sheetwrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:10}
.sheetwrap.show{display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--paper);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:20px 20px 26px;max-height:78dvh;overflow-y:auto}
.sheet h3{font-size:15px;font-weight:900;margin:14px 0 8px}
.sheet h3:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chips button{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:800;color:#5B6672;cursor:pointer}
.chips button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chips button.g.on{background:var(--gc);border-color:var(--gc);color:#fff}
.sheet .apply{width:100%;margin-top:18px;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:900;background:var(--hl);color:#3B3400;cursor:pointer}
.togglerow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;font-size:14px;font-weight:800}
.togglerow small{display:block;font-size:11px;font-weight:600;color:var(--muted)}
.sw{width:48px;height:28px;border-radius:99px;background:#C7CDD4;position:relative;cursor:pointer;transition:.2s;border:none;flex-shrink:0}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw.on{background:var(--right)} .sw.on::after{left:23px}
/* 이어하기 오버레이 */
.resume{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:20;align-items:center;justify-content:center;padding:20px}
.resume.show{display:flex}
.rbox{background:var(--paper);border-radius:18px;padding:26px 22px;max-width:380px;width:100%;text-align:center}
.rbox h3{font-size:18px;font-weight:900;margin-bottom:6px}
.rbox p{font-size:13.5px;color:var(--muted);font-weight:600;margin-bottom:18px}
.rbox button{width:100%;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:9px}
.rbox .go{background:var(--hl);color:#3B3400}
.rbox .fresh{background:var(--ink);color:#fff}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1 id="chTitle">불러오는 중…</h1>
    <span class="pill" id="roundPill" style="display:none"></span>
    <span class="pill" id="scorePill">⭕ <b id="okCnt">0</b> · ❌ <b id="noCnt">0</b></span>
    <button class="iconbtn" onclick="location.href='index.html'">목차</button>
    <button class="iconbtn" id="filterBtn">필터</button>
  </div>
  <div class="progress"><i id="progBar"></i></div>

  <div class="card" id="card">
    <div class="cardhead">
      <span class="badge" id="gradeBadge">-</span>
      <span class="theme" id="themeLbl"></span>
      <span class="weakchip" id="weakChip" style="display:none"></span>
      <span class="qno" id="qnoLbl"></span>
    </div>
    <div class="qscroll">
      <div class="concept" id="conceptBox"><div class="clabel">💡 이번 문제 주제 — 아는 내용을 떠올린 뒤 풀어보세요</div><div class="cbody" id="conceptBody"></div></div>
      <div class="qtext" id="qText"></div>
      <div class="src" id="srcLbl"></div>
      <div class="result" id="result">
        <div class="verdict" id="verdict">
          <span class="mark" id="vMark"></span>
          <span class="anslabel">정답:</span>
          <span class="anschip" id="ansChip"></span>
        </div>
        <div class="exp" id="expBox"></div>
      </div>
    </div>
  </div>

  <div class="done" id="doneBox">
    <h2>학습 완료 🚒</h2>
    <div class="score"><span id="finalScore">0</span><small> / <span id="finalTotal">0</span></small></div>
    <p id="doneMsg"></p>
    <div class="btns">
      <button class="nextch" id="nextChBtn">다음 챕터 →</button>
      <button class="retryWrong" id="retryWrongBtn">❌ 이번 오답만 다시 풀기</button>
      <button class="restart" id="restartBtn">처음부터 다시</button>
    </div>
    <div class="histbox" id="histBox" style="display:none">
      <h4>📈 회차 기록</h4>
      <div id="histList"></div>
    </div>
  </div>

  <div class="controls">
    <div class="oxrow" id="oxRow">
      <button class="btnO" data-a="O">O</button>
      <button class="btnX" data-a="X">X</button>
    </div>
    <div class="numrow" id="numRow" style="display:none">
      <button data-a="①">①</button><button data-a="②">②</button><button data-a="③">③</button><button data-a="④">④</button><button data-a="⑤">⑤</button>
    </div>
    <button class="studybtn" id="studyBtn">개념 확인 완료 → 문제 풀기</button>
    <button class="nextbtn" id="nextBtn">다음 문제 →</button>
  </div>
</div>

<div class="sheetwrap" id="sheetWrap">
  <div class="sheet">
    <h3>학습 모드</h3>
    <div class="chips" id="modeChips">
      <button data-m="quiz" class="on">문제 먼저 풀기 (실전)</button>
      <button data-m="learn">개념 먼저 보기 (학습)</button>
    </div>
    <h3>유형</h3><div class="chips" id="themeChips"></div>
    <h3>등급</h3><div class="chips" id="gradeChips"></div>
    <div class="togglerow" style="margin-top:14px"><span>취약 문제만<small>지금까지 한 번이라도 틀린 문제</small></span><button class="sw" id="weakOnlySw"></button></div>
    <div class="togglerow"><span>취약 문제부터<small>누적 오답 많은 순으로 정렬(섞기보다 우선)</small></span><button class="sw" id="weakFirstSw"></button></div>
    <div class="togglerow"><span>문제 순서 섞기</span><button class="sw" id="shuffleSw"></button></div>
    <button class="apply" id="applyBtn">이 조건으로 새로 시작</button>
  </div>
</div>

<div class="resume" id="resumeBox">
  <div class="rbox">
    <h3>풀던 기록이 있습니다</h3>
    <p id="resumeMsg"></p>
    <button class="go" id="resumeGo">이어서 풀기</button>
    <button class="fresh" id="resumeFresh">처음부터 새로 시작</button>
  </div>
</div>

<script>
let QUESTIONS = [];
const CH = new URLSearchParams(location.search).get("ch") || "";
const LSKEY = "fc:" + CH;
const GC = {"S":"#C00000","A":"#ED7D31","B":"#D9A400","C":"#2E75B6","기":"#70AD47","인":"#7030A0","소":"#D64550","Z":"#7F7F7F"};

/* ── 클라우드 동기화 (기기 간 진도 공유) ── */
const DBURL = "https://work-schedule-dash-4ceb2-default-rtdb.firebaseio.com";
const SYNC = (localStorage.getItem("fc:synccode") || "").trim();
function cloudUrl(p){ return `${DBURL}/flashcards/${encodeURIComponent(SYNC)}/${p}.json`; }
let _pushTimer=null;
function pushCloud(){
  if(!SYNC || !CH) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(()=>{
    fetch(cloudUrl("ch/"+CH), {method:"PUT", body:JSON.stringify(S)}).catch(()=>{});
  }, 1200);
}
async function pullCloud(){
  if(!SYNC || !CH) return;
  try{
    const r = await fetch(cloudUrl("ch/"+CH), {cache:"no-store"});
    if(!r.ok) return;
    const c = await r.json();
    if(c && (c._at||0) > (S._at||0)){
      S = Object.assign({rounds:0,best:0,last:0,wrongNos:[],history:[],qstat:{},prog:null}, c);
      if(!S.qstat) S.qstat={};
      if(!S.history) S.history=[];
      try{ localStorage.setItem(LSKEY, JSON.stringify(S)); }catch(e){}
    }
  }catch(e){}
}
let _optTimer=null;
function pushOpts(){
  if(!SYNC) return;
  clearTimeout(_optTimer);
  _optTimer = setTimeout(()=>{
    fetch(cloudUrl("opts"), {method:"PUT", body:JSON.stringify(OPT)}).catch(()=>{});
  }, 800);
}
async function pullOpts(){
  if(!SYNC) return;
  try{
    const r = await fetch(cloudUrl("opts"), {cache:"no-store"});
    if(!r.ok) return;
    const c = await r.json();
    if(c && (c._at||0) > (OPT._at||0)){
      OPT = Object.assign(OPT, c);
      if(!OPT.themes) OPT.themes={};
      try{ localStorage.setItem(OPTKEY, JSON.stringify(OPT)); }catch(e){}
      // 파생 변수 갱신 (필터/모드 UI 반영용)
      selGrades = new Set(OPT.grades||[]);
      selThemes = new Set((OPT.themes&&OPT.themes[CH])||[]);
      mode = OPT.mode||"quiz";
      shuffleOn = OPT.shuffle!==false;
      weakOnlyOn = !!OPT.weakOnly;
      weakFirstOn = !!OPT.weakFirst;
    }
  }catch(e){}
}
function applyToggleUI(){
  document.querySelectorAll("#modeChips button").forEach(b=>b.classList.toggle("on", b.dataset.m===mode));
  const setSw=(id,on)=>{ const e=$(id); if(e) e.classList.toggle("on", on); };
  setSw("shuffleSw", shuffleOn); setSw("weakOnlySw", weakOnlyOn); setSw("weakFirstSw", weakFirstOn);
}

/* ── 저장 구조 ──
S = { rounds, best, last, when, wrongNos,           // 요약
      history: [{n, when, total, ok, rate, wrongNos}],  // 회차별 기록
      qstat: { "문항no": {s:본 횟수, w:틀린 횟수} },      // 문항별 누적
      prog: {mode, nos, idx, ans:[[no,a,correct]], ok, no} }  // 진행중 세션
*/
let S = { rounds:0, best:0, last:0, wrongNos:[], history:[], qstat:{}, prog:null };
try { const raw = JSON.parse(localStorage.getItem(LSKEY) || "null"); if(raw) S = Object.assign(S, raw); } catch(e) {}
if(!S.qstat) S.qstat = {};
if(!S.history) S.history = [];
function save(){ if(CH){ S._at=Date.now(); try{ localStorage.setItem(LSKEY, JSON.stringify(S)); }catch(e){} pushCloud(); } }

/* 필터 옵션 전역 저장 (챕터 간 유지) */
const OPTKEY = "fc:opts";
let OPT = { grades:[], mode:"quiz", shuffle:true, weakOnly:false, weakFirst:false, themes:{} };
try { const o=JSON.parse(localStorage.getItem(OPTKEY)||"null"); if(o) OPT=Object.assign(OPT,o); }catch(e){}
if(!OPT.themes) OPT.themes={};
function saveOpt(){
  OPT.grades=[...selGrades];
  OPT.themes[CH]=[...selThemes];
  OPT.mode=mode; OPT.shuffle=shuffleOn; OPT.weakOnly=weakOnlyOn; OPT.weakFirst=weakFirstOn;
  OPT._at=Date.now();
  try{ localStorage.setItem(OPTKEY, JSON.stringify(OPT)); }catch(e){}
  pushOpts();
}

let deck=[], idx=0, ok=0, no=0, wrongs=[], answers=[];
let shuffleOn = OPT.shuffle!==false, mode = OPT.mode || "quiz";
let selThemes = new Set((OPT.themes&&OPT.themes[CH])||[]);
let selGrades = new Set(OPT.grades||[]);
let weakOnlyOn = !!OPT.weakOnly, weakFirstOn = !!OPT.weakFirst;

const $=id=>document.getElementById(id);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const qw=no=>(S.qstat[no]&&S.qstat[no].w)||0;

function updateRoundPill(){
  const p=$("roundPill");
  if(S.rounds){ p.style.display=""; p.textContent=`${S.rounds}회독 · 최고 ${S.best}%`; }
}
function trapPhrase(exp){
  const m = exp.match(/\[틀린 부분\]\s*'([^']+)'/);
  return m ? m[1] : null;
}
function renderExp(exp){
  if(exp.startsWith("[틀린 부분]") && exp.includes("→")){
    const i = exp.indexOf("→");
    let head = esc(exp.slice(0,i).trim());
    const tail = esc(exp.slice(i+1).trim());
    head = head.replace(/'([^']+)'/, "'<mark>$1</mark>'");
    return `<span class="trap">${head}</span> <span class="fix"><b>→</b> ${tail}</span>`;
  }
  return esc(exp);
}

function saveProg(){
  S.prog = { mode, nos: deck.map(q=>q.no), idx,
             ans: answers.map((a,i)=>a?[deck[i].no,a.a,a.correct]:null).filter(Boolean),
             ok, no };
  save();
}
function clearProg(){ S.prog=null; save(); }

function buildDeck(){
  deck = QUESTIONS.filter(q=>
    (selThemes.size===0 || selThemes.has(q.theme)) &&
    (selGrades.size===0 || selGrades.has(q.grade)) &&
    (!weakOnlyOn || qw(q.no)>0));
  if(weakFirstOn){
    deck=[...deck].sort((a,b)=>qw(b.no)-qw(a.no));
  } else if(shuffleOn){
    deck=[...deck];
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  }
  idx=0; ok=0; no=0; wrongs=[]; answers=[];
  clearProg();
  $("doneBox").style.display="none";
  $("card").style.display="flex";
  show();
}
function resumeSession(p){
  mode = p.mode || "quiz";
  const byNo = Object.fromEntries(QUESTIONS.map(q=>[q.no,q]));
  deck = p.nos.map(n=>byNo[n]).filter(Boolean);
  answers = new Array(deck.length);
  ok=0; no=0; wrongs=[];
  const ansByNo = Object.fromEntries((p.ans||[]).map(a=>[a[0],a]));
  deck.forEach((q,i)=>{
    const a = ansByNo[q.no];
    if(a){ answers[i]={a:a[1],correct:a[2]}; if(a[2]) ok++; else { no++; wrongs.push(q); } }
  });
  idx = Math.min(p.idx||0, deck.length);
  let firstOpen = answers.findIndex(a=>!a);
  if(firstOpen===-1) firstOpen = deck.length;
  if(!answers[idx] && idx>firstOpen) idx = firstOpen;
  $("doneBox").style.display="none";
  $("card").style.display="flex";
  document.querySelectorAll("#modeChips button").forEach(b=>b.classList.toggle("on", b.dataset.m===mode));
  show();
}

function show(){
  updateHud();
  if(idx>=deck.length){ return finish(); }
  const q=deck[idx];
  const g=q.grade in GC ? q.grade : null;
  document.querySelector(".card").style.setProperty("--gcol", g?GC[g]:"#B9C2CC");
  const badge=$("gradeBadge");
  badge.textContent=q.grade; badge.className="badge"+(g?"":" dim");
  if(g) badge.style.background=GC[g]; else badge.style.background="";
  $("themeLbl").textContent=q.theme;
  const w=qw(q.no);
  $("weakChip").style.display = w>0 ? "" : "none";
  if(w>0) $("weakChip").textContent = `누적 오답 ${w}회`;
  $("qnoLbl").textContent=`${idx+1} / ${deck.length}  (문항 ${q.no})`;
  $("qText").innerHTML=esc(q.q);
  $("srcLbl").textContent="출처: "+q.src;
  $("result").classList.remove("show");
  $("nextBtn").style.display="none";
  const isMC = !["O","X"].includes(q.ans);
  const done = answers[idx];
  if(done){
    $("conceptBox").classList.remove("show");
    $("qText").style.display=""; $("srcLbl").style.display="";
    $("studyBtn").style.display="none";
    reveal(q, done.correct);
  } else if(mode==="learn"){
    $("conceptBox").classList.add("show");
    $("conceptBody").textContent=(q.theme && q.theme.trim()) ? q.theme.trim() : "이 문제의 핵심을 떠올려 보세요";
    $("qText").style.display="none"; $("srcLbl").style.display="none";
    $("oxRow").style.display="none"; $("numRow").style.display="none";
    $("studyBtn").style.display="block";
  } else {
    $("conceptBox").classList.remove("show");
    $("qText").style.display=""; $("srcLbl").style.display="";
    $("oxRow").style.display=isMC?"none":"flex";
    $("numRow").style.display=isMC?"flex":"none";
    $("studyBtn").style.display="none";
  }
  document.querySelector(".qscroll").scrollTop=0;
}
function reveal(q, correct){
  const v=$("verdict"); v.className="verdict "+(correct?"ok":"no");
  $("vMark").textContent=correct?"⭕ 정답!":"❌ 오답";
  const chip=$("ansChip"); chip.textContent=q.ans;
  chip.className="anschip "+(q.ans==="O"?"O":q.ans==="X"?"X":"etc");
  $("expBox").innerHTML=renderExp(q.exp);
  const trap = q.ans==="X" ? trapPhrase(q.exp) : null;
  if(trap){
    const raw=esc(q.q), et=esc(trap);
    if(raw.includes(et)) $("qText").innerHTML=raw.replace(et,`<mark>${et}</mark>`);
  }
  $("result").classList.add("show");
  $("oxRow").style.display="none"; $("numRow").style.display="none";
  $("nextBtn").style.display="block";
}
function answer(a){
  const q=deck[idx];
  if(answers[idx] || $("result").classList.contains("show")) return;
  const correct = a===q.ans;
  if(correct) ok++; else { no++; wrongs.push(q); }
  answers[idx]={a:a, correct:correct};
  // 문항별 누적 통계 즉시 저장 (중간에 꺼도 기록 유지)
  const st = S.qstat[q.no] || (S.qstat[q.no]={s:0,w:0});
  st.s++; if(!correct) st.w++;
  saveProg();
  reveal(q, correct);
  updateHud();
  setTimeout(()=>{$("result").scrollIntoView({behavior:"smooth",block:"nearest"});},60);
}
function next(){
  if(idx<deck.length && !answers[idx]) return;
  idx++;
  if(idx<deck.length) saveProg();
  show();
}
function prev(){
  if($("doneBox").style.display==="block" && deck.length){
    $("doneBox").style.display="none"; $("card").style.display="flex";
    idx=deck.length-1; show(); return;
  }
  if(idx>0){ idx--; show(); }
}
function finish(){
  $("card").style.display="none";
  $("oxRow").style.display="none"; $("numRow").style.display="none";
  $("nextBtn").style.display="none"; $("studyBtn").style.display="none";
  $("doneBox").style.display="block";
  $("finalScore").textContent=ok; $("finalTotal").textContent=deck.length;
  const rate=deck.length?Math.round(ok/deck.length*100):0;
  $("doneMsg").textContent = rate===100 ? "완벽합니다. 이 단원은 접어두세요." :
    rate>=80 ? `정답률 ${rate}% — 오답 ${no}개만 잡으면 끝납니다.` :
    `정답률 ${rate}% — 오답 위주로 한 번 더 돌리세요.`;
  $("retryWrongBtn").style.display = wrongs.length? "block":"none";
  const nb=$("nextChBtn");
  if(NEXTCH){ nb.textContent=`다음 챕터: ${NEXTCH.title} →`; nb.style.display="block"; }
  else nb.style.display="none";
  if(CH && deck.length){
    S.rounds=(S.rounds||0)+1;
    S.best=Math.max(S.best||0, rate);
    S.last=rate; S.when=Date.now();
    S.wrongNos=wrongs.map(w=>w.no);
    S.history.push({n:S.rounds, when:Date.now(), total:deck.length, ok:ok, rate:rate, wrongNos:S.wrongNos});
    if(S.history.length>30) S.history=S.history.slice(-30);
    S.prog=null;
    save();
    updateRoundPill();
    renderHistory();
  }
}
function renderHistory(){
  if(!S.history.length){ $("histBox").style.display="none"; return; }
  $("histBox").style.display="";
  const list=$("histList"); list.innerHTML="";
  for(const h of [...S.history].slice(-5).reverse()){
    const d=new Date(h.when);
    const row=document.createElement("div"); row.className="hrow";
    row.innerHTML=`<span class="hn">${h.n}회차</span><span>${d.getMonth()+1}/${d.getDate()}</span>
      <span>${h.ok}/${h.total}</span>
      <span class="hr8" style="color:${h.rate>=80?'#2E7D32':'#C62828'}">${h.rate}%</span>
      ${h.wrongNos.length?`<span class="hw">오답 ${h.wrongNos.length}</span>`:""}`;
    list.appendChild(row);
  }
}
function updateHud(){
  $("okCnt").textContent=ok; $("noCnt").textContent=no;
  const p = deck.length? (answers.filter(Boolean).length/deck.length*100):0;
  $("progBar").style.width=p+"%";
}

/* 다음 챕터 (manifest 순서 기준) */
let NEXTCH=null;
fetch("data/manifest.json").then(r=>r.json()).then(d=>{
  const i=(d.chapters||[]).findIndex(c=>c.id===CH);
  if(i>=0 && i+1<d.chapters.length) NEXTCH=d.chapters[i+1];
}).catch(()=>{});

/* 이벤트 */
document.querySelectorAll(".oxrow button,.numrow button").forEach(b=>b.addEventListener("click",()=>answer(b.dataset.a)));
$("nextChBtn").addEventListener("click",()=>{ if(NEXTCH) location.href="app.html?ch="+NEXTCH.id; });
$("nextBtn").addEventListener("click",next);
$("restartBtn").addEventListener("click",buildDeck);
$("retryWrongBtn").addEventListener("click",()=>{
  deck=[...wrongs]; idx=0; ok=0; no=0; wrongs=[]; answers=[];
  clearProg();
  $("doneBox").style.display="none"; $("card").style.display="flex"; show();
});
$("studyBtn").addEventListener("click",()=>{
  const q=deck[idx]; const isMC=!["O","X"].includes(q.ans);
  $("conceptBox").classList.remove("show");
  $("qText").style.display=""; $("srcLbl").style.display="";
  $("oxRow").style.display=isMC?"none":"flex";
  $("numRow").style.display=isMC?"flex":"none";
  $("studyBtn").style.display="none";
});
document.addEventListener("keydown",e=>{
  const k=e.key;
  if(k==="ArrowLeft"){ e.preventDefault(); prev(); return; }
  if(k==="ArrowRight"){
    e.preventDefault();
    if($("studyBtn").style.display==="block"){ $("studyBtn").click(); return; }
    if($("nextBtn").style.display==="block") next();
    return;
  }
  if($("studyBtn").style.display==="block"){
    if(k==="Enter"||k===" "){ e.preventDefault(); $("studyBtn").click(); }
    return;
  }
  if($("nextBtn").style.display==="block" && (k==="Enter"||k===" ")){ e.preventDefault(); next(); return; }
  const q=deck[idx]; if(!q) return;
  const isMC = !["O","X"].includes(q.ans);
  if(isMC){
    if("12345".includes(k)) answer("①②③④⑤"[Number(k)-1]);
  } else {
    if(k==="1"||k.toLowerCase()==="o") answer("O");
    if(k==="2"||k.toLowerCase()==="x") answer("X");
  }
});

/* 필터 시트 */
const ALLGRADES=["S","A","B","C","기","인","소","Z","-"];
function initChips(){
  const themes=[...new Set(QUESTIONS.map(q=>q.theme))];
  themes.forEach(t=>{
    const b=document.createElement("button"); b.textContent=t;
    if(selThemes.has(t)) b.classList.add("on");
    b.onclick=()=>{b.classList.toggle("on"); b.classList.contains("on")?selThemes.add(t):selThemes.delete(t);};
    $("themeChips").appendChild(b);
  });
  const present=new Set(QUESTIONS.map(q=>((q.grade||"").trim())||"-"));
  ALLGRADES.filter(g=>present.has(g)).forEach(g=>{
    const b=document.createElement("button"); b.textContent=g==="-"?"등급없음":g; b.classList.add("g");
    if(GC[g]) b.style.setProperty("--gc",GC[g]);
    if(selGrades.has(g)) b.classList.add("on");
    b.onclick=()=>{b.classList.toggle("on"); b.classList.contains("on")?selGrades.add(g):selGrades.delete(g);};
    $("gradeChips").appendChild(b);
  });
}
document.querySelectorAll("#modeChips button").forEach(b=>{
  b.classList.toggle("on", b.dataset.m===mode);
  b.onclick=()=>{
    document.querySelectorAll("#modeChips button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); mode=b.dataset.m;
  };
});
$("filterBtn").onclick=()=>$("sheetWrap").classList.add("show");
$("sheetWrap").addEventListener("click",e=>{if(e.target===$("sheetWrap"))$("sheetWrap").classList.remove("show");});
const sw=$("shuffleSw"); sw.classList.toggle("on",shuffleOn);
sw.onclick=()=>{sw.classList.toggle("on"); shuffleOn=sw.classList.contains("on");};
const wosw=$("weakOnlySw"); wosw.classList.toggle("on",weakOnlyOn);
wosw.onclick=()=>{wosw.classList.toggle("on"); weakOnlyOn=wosw.classList.contains("on");};
const wfsw=$("weakFirstSw"); wfsw.classList.toggle("on",weakFirstOn);
wfsw.onclick=()=>{wfsw.classList.toggle("on"); weakFirstOn=wfsw.classList.contains("on");};
$("applyBtn").onclick=()=>{saveOpt(); $("sheetWrap").classList.remove("show"); buildDeck();};

/* 로딩 */
(async () => {
  try {
    await Promise.all([pullCloud(), pullOpts()]);  // 다른 기기의 진도·필터 설정 먼저 반영
    const r = await fetch(`chapters/${CH}.json`);
    if(!r.ok) throw new Error();
    const d = await r.json();
    QUESTIONS = d.questions;
    document.title = d.title + " 플래시카드";
    $("chTitle").textContent = d.title;
    initChips(); applyToggleUI(); updateRoundPill(); renderHistory();
    // 진행중 세션이 있으면 이어하기 제안
    if(S.prog && S.prog.nos && S.prog.nos.length && (S.prog.ans||[]).length < S.prog.nos.length){
      const done=(S.prog.ans||[]).length, total=S.prog.nos.length;
      $("resumeMsg").textContent=`${total}문제 중 ${done}문제까지 풀었습니다. (${S.prog.mode==="learn"?"개념 먼저":"실전"} 모드)`;
      $("resumeBox").classList.add("show");
      $("resumeGo").onclick=()=>{$("resumeBox").classList.remove("show"); resumeSession(S.prog);};
      $("resumeFresh").onclick=()=>{$("resumeBox").classList.remove("show"); buildDeck();};
    } else {
      buildDeck();
    }
  } catch(e) {
    $("chTitle").textContent = "챕터를 불러올 수 없습니다";
    $("qText").innerHTML = "URL에 <b>?ch=챕터ID</b>가 필요합니다.<br>목차(index.html)에서 챕터를 선택해 주세요.";
  }
})();
</script>
