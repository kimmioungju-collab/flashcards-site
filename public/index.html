<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OX 플래시카드 목차</title>
<style>
:root{--desk:#2B3A4A;--desk-deep:#22303D;--paper:#FBFAF7;--ink:#1E242B;--hl:#FFE34D;--wrong:#D64550;--right:#2E75B6;--muted:#7A8694;--line:#E4E0D6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
  background:linear-gradient(160deg,var(--desk),var(--desk-deep));min-height:100dvh;
  display:flex;justify-content:center;padding:18px 14px 40px;color:var(--ink)}
.wrap{width:100%;max-width:560px}
h1{color:#fff;font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.sub{color:#9DB0C0;font-size:12.5px;font-weight:600;margin-bottom:14px}
.search{width:100%;border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;
  background:rgba(255,255,255,.14);color:#fff;margin-bottom:14px;outline:none}
.search::placeholder{color:#8FA0B0}
.list{display:flex;flex-direction:column;gap:10px}
a.ch{display:block;background:var(--paper);border-radius:14px;padding:14px 16px;text-decoration:none;color:var(--ink);
  box-shadow:0 6px 18px rgba(0,0,0,.28);position:relative;overflow:hidden}
a.ch::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--hl)}
a.ch.done::before{background:var(--right)}
.row1{display:flex;align-items:baseline;gap:8px}
.cid{font-size:11.5px;font-weight:900;color:var(--muted);letter-spacing:.5px}
.ctitle{font-size:15.5px;font-weight:800;flex:1;word-break:keep-all}
.row2{display:flex;gap:8px;margin-top:7px;font-size:12px;font-weight:700;color:var(--muted);flex-wrap:wrap}
.stat{background:#EFECE3;border-radius:99px;padding:2.5px 10px}
.stat.best{background:#E2F0D9;color:#2E7D32}
.stat.new{background:#FFF3C4;color:#8A7B1E}
.stat.wrong{background:#FDEBEC;color:#C62828}
.grades{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.gc{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:#fff;
  border-radius:99px;padding:2px 8px;background:var(--gc,#7F7F7F)}
.gc b{font-weight:900}
.empty{color:#9DB0C0;text-align:center;padding:40px 0;font-weight:700}
.syncbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:700;color:#9DB0C0}
.syncbar #syncState{flex:1}
.syncbar #syncState.on{color:#8FE388}
.syncbar button{border:none;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:800;
  background:rgba(255,255,255,.16);color:#fff;cursor:pointer}
.plan{background:var(--paper);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.28)}
.plan .ph{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:900;margin-bottom:8px}
.plan .ph .pedit{margin-left:auto;display:flex;gap:6px}
.plan .ph button{border:none;border-radius:99px;padding:4px 10px;font-size:11.5px;font-weight:800;
  background:#EFECE3;color:#3A4553;cursor:pointer}
.plan .pmsg{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:10px;line-height:1.5}
.plan .pbig{font-size:13px;font-weight:800;color:var(--ink);display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:8px}
.plan .pbig b{font-weight:900}
.plan .pbar{height:9px;border-radius:99px;background:#EAE6DC;overflow:hidden;margin:8px 0 6px}
.plan .pbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#2E75B6,#5B9BD5)}
.plan .pbadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:12px;font-weight:800}
.plan .pb{border-radius:99px;padding:3px 11px}
.plan .pb.ok{background:#E2F0D9;color:#2E7D32}
.plan .pb.bad{background:#FDEBEC;color:#C62828}
.plan .pb.info{background:#EFECE3;color:#3A4553}
.plan .pb.warn{background:#FFF3C4;color:#8A7B1E}
.plan .pbtn{border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:800;background:#2E75B6;color:#fff;cursor:pointer}
.toolbar{display:flex;gap:8px;margin-bottom:14px}
.toolbar .search{margin-bottom:0;flex:1}
.toolbar .leftbtn{border:none;border-radius:14px;padding:0 14px;font-size:12.5px;font-weight:800;
  background:rgba(255,255,255,.14);color:#9DB0C0;cursor:pointer;white-space:nowrap}
.toolbar .leftbtn.on{background:#2E75B6;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 OX 플래시카드</h1>
  <div class="sub" id="summary">불러오는 중…</div>
  <div class="syncbar"><span id="syncState">☁️ 동기화 꺼짐</span><button id="syncBtn">코드 설정</button></div>
  <div class="plan" id="planCard" style="display:none"></div>
  <div class="toolbar">
    <input class="search" id="q" placeholder="챕터 검색 (예: 비례, 신뢰보호)">
    <button class="leftbtn" id="leftBtn">남은 챕터만</button>
  </div>
  <div class="list" id="list"></div>
</div>
<script>
let chapters=[];
const GC={"S":"#C00000","A":"#ED7D31","B":"#D9A400","C":"#2E75B6","기":"#70AD47","인":"#7030A0","소":"#D64550","Z":"#7F7F7F","-":"#9AA3AD"};
const GORDER=["S","A","B","C","기","인","소","Z","-"];
function gradesHtml(g){
  if(!g) return "";
  const keys=Object.keys(g).sort((a,b)=>GORDER.indexOf(a)-GORDER.indexOf(b));
  if(!keys.length) return "";
  const chips=keys.map(k=>`<span class="gc" style="--gc:${GC[k]||'#7F7F7F'}">${k==="-"?"무":k} <b>${g[k]}</b></span>`).join("");
  return `<div class="grades">${chips}</div>`;
}
function stat(id){
  try{ return JSON.parse(localStorage.getItem("fc:"+id)||"null"); }catch(e){ return null; }
}
/* 1회독 커버리지: 실제로 한 번 이상 본 문항 수 */
function chSeen(c){
  const s=stat(c.id); if(!s||!s.qstat) return 0;
  let n=0; for(const k in s.qstat){ if(s.qstat[k] && s.qstat[k].s>0) n++; }
  return Math.min(n, c.count);
}
function chDone(c){ return c.count>0 && chSeen(c)>=c.count; }
let leftOnly=false;
function render(filter=""){
  const box=document.getElementById("list");
  box.innerHTML="";
  const f=filter.trim();
  const items=chapters.filter(c=>(!f || c.title.includes(f) || c.id.includes(f)) && (!leftOnly || !chDone(c)));
  if(!items.length){ box.innerHTML='<div class="empty">'+(leftOnly?"남은 챕터가 없습니다 🎉":"검색 결과가 없습니다")+'</div>'; return; }
  for(const c of items){
    const s=stat(c.id);
    const done=chDone(c), seen=chSeen(c);
    const a=document.createElement("a");
    a.className="ch"+(done ? " done":"");
    a.href=`app.html?ch=${c.id}`;
    let stats="";
    if(done) stats += `<span class="stat best">1회독 ✓</span>`;
    else if(seen>0) stats += `<span class="stat new">진도 ${seen}/${c.count}</span>`;
    if(s){
      if(s.rounds) stats += `<span class="stat">${s.rounds}회독</span><span class="stat best">최고 ${s.best}%</span>`;
      const weak = s.qstat ? Object.values(s.qstat).filter(x=>x.w>0).length : 0;
      if(weak) stats += `<span class="stat wrong">취약 ${weak}문항</span>`;
      if(s.prog && s.prog.nos && (s.prog.ans||[]).length < s.prog.nos.length)
        stats += `<span class="stat new">풀던 중 ${(s.prog.ans||[]).length}/${s.prog.nos.length}</span>`;
    }
    if(!stats) stats = `<span class="stat new">미학습</span>`;
    a.innerHTML=`<div class="row1"><span class="cid">${c.id.toUpperCase()}</span><span class="ctitle">${c.title}</span></div>
      <div class="row2"><span class="stat">${c.count}문항</span>${stats}</div>
      ${gradesHtml(c.grades)}`;
    box.appendChild(a);
  }
}
/* ── 클라우드 동기화 ── */
const DBURL="https://work-schedule-dash-4ceb2-default-rtdb.firebaseio.com";
function syncCode(){ return (localStorage.getItem("fc:synccode")||"").trim(); }
function updateSyncUI(){
  const c=syncCode(), el=document.getElementById("syncState"), btn=document.getElementById("syncBtn");
  if(c){ el.textContent="☁️ 동기화 켜짐 · 코드 "+c; el.classList.add("on"); btn.textContent="변경/끄기"; }
  else { el.textContent="☁️ 동기화 꺼짐"; el.classList.remove("on"); btn.textContent="코드 설정"; }
}
async function pullAll(){
  const c=syncCode(); if(!c) return;
  try{
    const r=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch.json`,{cache:"no-store"});
    if(!r.ok) return;
    const cloud=await r.json(); if(!cloud) return;
    for(const id of Object.keys(cloud)){
      const rec=cloud[id]; if(!rec) continue;
      const local=stat(id);
      if(!local || (rec._at||0) > (local._at||0)){
        try{ localStorage.setItem("fc:"+id, JSON.stringify(rec)); }catch(e){}
      }
    }
  }catch(e){}
  // 학습 플랜도 내려받기
  try{
    const rp=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{cache:"no-store"});
    if(rp.ok){ const cp=await rp.json(); const lp=loadPlan();
      if(cp && (cp._at||0) > ((lp&&lp._at)||0)) localStorage.setItem("fc:plan", JSON.stringify(cp)); }
  }catch(e){}
}
async function pushAll(){
  const c=syncCode(); if(!c) return;
  let cloud={};
  try{ const r=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch.json`,{cache:"no-store"}); if(r.ok) cloud=(await r.json())||{}; }catch(e){}
  for(const ch of chapters){
    const local=stat(ch.id); if(!local) continue;
    if(local._at==null){ local._at=Date.now(); try{ localStorage.setItem("fc:"+ch.id, JSON.stringify(local)); }catch(e){} }
    const cl=cloud[ch.id];
    if(!cl || (local._at||0) > (cl._at||0)){
      try{ await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch/${ch.id}.json`,{method:"PUT",body:JSON.stringify(local)}); }catch(e){}
    }
  }
  // 필터/학습모드 설정도 시딩
  try{
    const opt=JSON.parse(localStorage.getItem("fc:opts")||"null");
    if(opt){
      if(opt._at==null){ opt._at=Date.now(); localStorage.setItem("fc:opts", JSON.stringify(opt)); }
      let co=null;
      try{ const ro=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/opts.json`,{cache:"no-store"}); if(ro.ok) co=await ro.json(); }catch(e){}
      if(!co || (opt._at||0) > (co._at||0))
        await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/opts.json`,{method:"PUT",body:JSON.stringify(opt)});
    }
  }catch(e){}
  // 학습 플랜 시딩
  try{
    const p=loadPlan();
    if(p){
      if(p._at==null){ p._at=Date.now(); localStorage.setItem("fc:plan", JSON.stringify(p)); }
      let cp=null;
      try{ const rp=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{cache:"no-store"}); if(rp.ok) cp=await rp.json(); }catch(e){}
      if(!cp || (p._at||0) > (cp._at||0))
        await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{method:"PUT",body:JSON.stringify(p)});
    }
  }catch(e){}
}
function pushPlan(){
  const c=syncCode(); if(!c) return;
  const p=loadPlan(); if(!p) return;
  fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{method:"PUT",body:JSON.stringify(p)}).catch(()=>{});
}
document.getElementById("syncBtn").onclick=async ()=>{
  const cur=syncCode();
  const v=prompt("기기 간 진도를 공유할 동기화 코드를 입력하세요.\n같은 코드를 쓰는 기기끼리 진도가 동기화됩니다.\n(끄려면 빈칸으로 두고 확인)", cur);
  if(v===null) return;
  const code=v.trim();
  if(code) localStorage.setItem("fc:synccode", code);
  else localStorage.removeItem("fc:synccode");
  updateSyncUI();
  if(code){
    document.getElementById("syncState").textContent="☁️ 동기화 중…";
    await pullAll();      // 다른 기기 진도 받기
    await pushAll();      // 이 기기 기존 진도 올리기
    updateSyncUI();
    render(document.getElementById("q").value);
  }
  alert(code? "동기화 켜짐. 다른 기기에서도 같은 코드 '"+code+"'를 입력하세요.":"동기화를 껐습니다.");
};

/* ── 학습 플랜 (N일 1회독) ── */
function loadPlan(){ try{ return JSON.parse(localStorage.getItem("fc:plan")||"null"); }catch(e){ return null; } }
function savePlan(p){ p._at=Date.now(); localStorage.setItem("fc:plan", JSON.stringify(p)); pushPlan(); }
function todayStr(){ const d=new Date(); d.setHours(0,0,0,0);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function setupPlan(){
  const cur=loadPlan();
  const dv=prompt("며칠 안에 1회독을 끝낼까요? (일수)", cur?cur.days:"10");
  if(dv===null) return;
  const days=Math.max(1, parseInt(dv)||10);
  const start=(cur&&cur.start)?cur.start:todayStr();
  savePlan({start, days});
  renderPlan(); render(document.getElementById("q").value);
}
function resetPlanStart(){
  const cur=loadPlan(); if(!cur) return;
  if(!confirm("시작일을 오늘("+todayStr()+")로 다시 맞출까요?\n(진행 기록은 그대로 유지됩니다)")) return;
  savePlan({start:todayStr(), days:cur.days});
  renderPlan(); render(document.getElementById("q").value);
}
function renderPlan(){
  const card=document.getElementById("planCard"); if(!card) return;
  card.style.display="block";
  const p=loadPlan();
  if(!p){
    card.innerHTML=`<div class="ph">🎯 학습 플랜</div>
      <div class="pmsg">며칠 안에 1회독을 끝낼지 목표를 정하면, 진행률·남은 챕터·하루 권장량을 자동으로 관리해드려요.</div>
      <button class="pbtn" id="planSet">플랜 시작</button>`;
    document.getElementById("planSet").onclick=setupPlan; return;
  }
  const T=chapters.length;
  const D=chapters.filter(chDone).length;
  const left=T-D;
  const totalQ=chapters.reduce((s,c)=>s+(c.count||0),0);
  const seenQ=chapters.reduce((s,c)=>s+chSeen(c),0);
  const pct=totalQ?Math.round(seenQ/totalQ*100):0;
  const start=new Date(p.start+"T00:00:00");
  const today=new Date(); today.setHours(0,0,0,0);
  const dayNum=Math.floor((today-start)/86400000)+1;   // 1일차부터
  const days=p.days;
  const dayShown=Math.min(Math.max(dayNum,1),days);
  const daysLeft=Math.max(0, days-(dayNum-1));          // 오늘 포함 남은 일수
  const end=new Date(start.getTime()+(days-1)*86400000);
  const endStr=`${end.getMonth()+1}/${end.getDate()}`;
  const targetByToday=Math.min(T, Math.ceil(Math.min(Math.max(dayNum,1),days)/days*T));
  const behind=Math.max(0, targetByToday-D);
  const ahead=Math.max(0, D-targetByToday);
  const perDay=daysLeft>0?Math.ceil(left/daysLeft):left;
  const overdue = dayNum>days;

  let badges="";
  if(D>=T) badges=`<span class="pb ok">🎉 1회독 완료!</span>`;
  else if(overdue) badges=`<span class="pb bad">기한 초과 · 남은 ${left}챕터</span>`;
  else if(behind>0) badges=`<span class="pb bad">⚠️ ${behind}챕터 뒤처짐</span>`;
  else badges=`<span class="pb ok">✅ 순조${ahead>0?` (${ahead}챕터 앞섬)`:""}</span>`;
  if(D<T && !overdue) badges+=`<span class="pb info">오늘까지 목표 ${targetByToday}챕터</span>`;
  if(D<T) badges+=`<span class="pb ${daysLeft<=1&&left>0?"warn":"info"}">하루 ${perDay}챕터 권장</span>`;

  card.innerHTML=`
    <div class="ph">🎯 학습 플랜
      <span class="pedit">
        <button id="planEdit">설정</button>
        <button id="planReset">오늘부터</button>
      </span>
    </div>
    <div class="pbig">
      <span>진도 <b>${D}/${T}</b>챕터 · <b>${pct}%</b></span>
      <span>${overdue?`<b style="color:#C62828">기한 초과</b>`:`<b>${dayShown}</b>일차 / 목표 ${days}일 (D-${daysLeft})`}</span>
      <span style="color:var(--muted)">종료 예정 ${endStr}</span>
    </div>
    <div class="pbar"><i style="width:${pct}%"></i></div>
    <div class="pbadges">${badges}</div>`;
  document.getElementById("planEdit").onclick=setupPlan;
  document.getElementById("planReset").onclick=resetPlanStart;
}

document.getElementById("leftBtn").onclick=()=>{
  leftOnly=!leftOnly;
  document.getElementById("leftBtn").classList.toggle("on",leftOnly);
  render(document.getElementById("q").value);
};

fetch("data/manifest.json").then(r=>r.json()).then(async d=>{
  chapters=d.chapters;
  updateSyncUI();
  await pullAll();  // 다른 기기 진도 먼저 반영
  const studied=chapters.filter(c=>stat(c.id)).length;
  document.getElementById("summary").textContent=`전체 ${chapters.length}챕터 · 학습 시작 ${studied}챕터`;
  renderPlan();
  render();
});
document.getElementById("q").addEventListener("input",e=>render(e.target.value));
</script>
</body>
</html>
