<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OX 플래시카드 목차</title>
<style>
:root{--desk:#2B3A4A;--desk-deep:#22303D;--paper:#FBFAF7;--ink:#1E242B;--hl:#FFE34D;--wrong:#D64550;--right:#2E75B6;--muted:#7A8694;--line:#E4E0D6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
  background:linear-gradient(160deg,var(--desk),var(--desk-deep));min-height:100dvh;
  display:flex;justify-content:center;padding:18px 14px 40px;color:var(--ink)}
.wrap{width:100%;max-width:560px}
h1{color:#fff;font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.sub{color:#9DB0C0;font-size:12.5px;font-weight:600;margin-bottom:14px}
.search{width:100%;border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;
  background:rgba(255,255,255,.14);color:#fff;margin-bottom:14px;outline:none}
.search::placeholder{color:#8FA0B0}
.list{display:flex;flex-direction:column;gap:10px}
a.ch{display:block;background:var(--paper);border-radius:14px;padding:14px 16px;text-decoration:none;color:var(--ink);
  box-shadow:0 6px 18px rgba(0,0,0,.28);position:relative;overflow:hidden}
a.ch::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--hl)}
a.ch.done::before{background:var(--right)}
.row1{display:flex;align-items:baseline;gap:8px}
.cid{font-size:11.5px;font-weight:900;color:var(--muted);letter-spacing:.5px}
.ctitle{font-size:15.5px;font-weight:800;flex:1;word-break:keep-all}
.row2{display:flex;gap:8px;margin-top:7px;font-size:12px;font-weight:700;color:var(--muted);flex-wrap:wrap}
.stat{background:#EFECE3;border-radius:99px;padding:2.5px 10px}
.stat.best{background:#E2F0D9;color:#2E7D32}
.stat.new{background:#FFF3C4;color:#8A7B1E}
.stat.wrong{background:#FDEBEC;color:#C62828}
.stat.last{background:#E9E6F7;color:#5B4FA0}
.grades{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.gc{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:#fff;
  border-radius:99px;padding:2px 8px;background:var(--gc,#7F7F7F)}
.gc b{font-weight:900}
.empty{color:#9DB0C0;text-align:center;padding:40px 0;font-weight:700}
.syncbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:700;color:#9DB0C0}
.syncbar #syncState{flex:1}
.syncbar #syncState.on{color:#8FE388}
.syncbar button{border:none;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:800;
  background:rgba(255,255,255,.16);color:#fff;cursor:pointer}
.plan{background:var(--paper);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.28)}
.plan .ph{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:900;margin-bottom:8px}
.plan .ph .pedit{margin-left:auto;display:flex;gap:6px}
.plan .ph button{border:none;border-radius:99px;padding:4px 10px;font-size:11.5px;font-weight:800;
  background:#EFECE3;color:#3A4553;cursor:pointer}
.plan .pmsg{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:10px;line-height:1.5}
.plan .pbig{font-size:13px;font-weight:800;color:var(--ink);display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:8px}
.plan .pbig b{font-weight:900}
.plan .pbar{height:9px;border-radius:99px;background:#EAE6DC;overflow:hidden;margin:8px 0 6px}
.plan .pbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#2E75B6,#5B9BD5)}
.plan .pbadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:12px;font-weight:800}
.plan .pb{border-radius:99px;padding:3px 11px}
.plan .pb.ok{background:#E2F0D9;color:#2E7D32}
.plan .pb.bad{background:#FDEBEC;color:#C62828}
.plan .pb.info{background:#EFECE3;color:#3A4553}
.plan .pb.warn{background:#FFF3C4;color:#8A7B1E}
.plan .ptime{margin-top:10px;font-size:12.5px;font-weight:800;line-height:1.55;border-radius:10px;padding:9px 12px;background:#EFECE3;color:#3A4553}
.plan .ptime.ok{background:#E2F0D9;color:#2E7D32}
.plan .ptime.bad{background:#FDEBEC;color:#C62828}
.plan .ptime b{font-weight:900}
.plan .ptime .sub{display:block;margin-top:3px;font-weight:600;opacity:.85;font-size:11.5px}
.plan .pbtn{border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:800;background:#2E75B6;color:#fff;cursor:pointer}
.plan .pgwrap{margin:2px 0 10px}
.plan .pglab{font-size:11.5px;font-weight:800;color:var(--muted);margin-bottom:5px}
.plan .pgchips{display:flex;flex-wrap:wrap;gap:5px}
.plan .pgc{border:1.5px solid #D8D2C6;background:#fff;color:#6B7280;border-radius:99px;
  padding:3px 10px;font-size:11.5px;font-weight:800;cursor:pointer;user-select:none}
.plan .pgc.on{border-color:var(--pgc);background:var(--pgc);color:#fff}
.toolbar{display:flex;gap:8px;margin-bottom:14px}
.toolbar .search{margin-bottom:0;flex:1}
.toolbar .leftbtn{border:none;border-radius:14px;padding:0 14px;font-size:12.5px;font-weight:800;
  background:rgba(255,255,255,.14);color:#9DB0C0;cursor:pointer;white-space:nowrap}
.toolbar .leftbtn.on{background:#2E75B6;color:#fff}
.tools2{display:flex;gap:8px;margin-bottom:14px}
.tools2 button{border:none;border-radius:12px;padding:9px 13px;font-size:12.5px;font-weight:800;
  background:rgba(255,255,255,.14);color:#9DB0C0;cursor:pointer;white-space:nowrap}
.tools2 button.on{background:#2E75B6;color:#fff}
/* 단원(편) 그룹 */
.unit{margin-bottom:4px}
.uhead{display:flex;align-items:center;gap:9px;cursor:pointer;color:#DCE6F0;font-weight:900;font-size:13.5px;
  padding:9px 4px 7px;user-select:none}
.uhead .uarrow{transition:transform .15s;font-size:11px;color:#9DB0C0;width:12px}
.uhead.collapsed .uarrow{transform:rotate(-90deg)}
.uhead .uname{flex:1;word-break:keep-all}
.uhead .ucount{font-size:11.5px;font-weight:800;color:#9DB0C0;background:rgba(255,255,255,.1);border-radius:99px;padding:2px 9px;white-space:nowrap}
.uhead .ubar{width:50px;height:6px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden;flex:none}
.uhead .ubar>i{display:block;height:100%;background:#5B9BD5}
.ubody{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.ubody.hide{display:none}
.stat.due{background:#FDEBEC;color:#C62828}
.stat.goal{background:#FFE9C7;color:#B26A00}
a.ch.goal::before{background:#F5A623}
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 OX 플래시카드</h1>
  <div class="sub" id="summary">불러오는 중…</div>
  <div class="syncbar"><span id="syncState">☁️ 동기화 꺼짐</span><button id="syncBtn">코드 설정</button></div>
  <div class="plan" id="planCard" style="display:none"></div>
  <div class="toolbar">
    <input class="search" id="q" placeholder="챕터 검색 (예: 비례, 신뢰보호)">
    <button class="leftbtn" id="leftBtn">남은 챕터만</button>
  </div>
  <div class="tools2">
    <button id="goalBtn">🎯 오늘 목표만</button>
    <button id="resetBtn">🗑 진도 초기화</button>
    <button id="foldBtn">단원 접기/펴기</button>
  </div>
  <div class="list" id="list"></div>
</div>
<script>
let chapters=[];
const GC={"S":"#C00000","A":"#ED7D31","B":"#D9A400","C":"#2E75B6","기":"#70AD47","인":"#7030A0","소":"#D64550","Z":"#7F7F7F","-":"#9AA3AD"};
const GORDER=["S","A","B","C","기","인","소","Z","-"];
function gradesHtml(g){
  if(!g) return "";
  const keys=Object.keys(g).sort((a,b)=>GORDER.indexOf(a)-GORDER.indexOf(b));
  if(!keys.length) return "";
  const chips=keys.map(k=>`<span class="gc" style="--gc:${GC[k]||'#7F7F7F'}">${k==="-"?"무":k} <b>${g[k]}</b></span>`).join("");
  return `<div class="grades">${chips}</div>`;
}
function stat(id){
  try{ return JSON.parse(localStorage.getItem("fc:"+id)||"null"); }catch(e){ return null; }
}
/* 1회독 커버리지: 실제로 한 번 이상 본 문항 수 (전체 등급 기준 — 목록용) */
function chSeen(c){
  const s=stat(c.id); if(!s||!s.qstat) return 0;
  let n=0; for(const k in s.qstat){ if(s.qstat[k] && s.qstat[k].s>0) n++; }
  return Math.min(n, c.count);
}
function chDone(c){ return c.count>0 && chSeen(c)>=c.count; }
let leftOnly=false, goalOnly=false;

/* ── 단원(편) 구분: 챕터 번호 범위별 ── */
const UNITS=[
  {name:"제1편 행정법 통론",        from:1,  to:12},
  {name:"제2편 행정입법",           from:13, to:15},
  {name:"제3편 행정행위·행정작용법", from:16, to:36},
  {name:"제4편 행정절차법",         from:37, to:41},
  {name:"제5편 실효성 확보수단",     from:42, to:49},
  {name:"제6편 행정쟁송(소송·심판)", from:50, to:70},
  {name:"제7편 국가배상·손실보상",   from:71, to:75},
  {name:"제8편 정보공개·개인정보",   from:76, to:81},
];
function chNum(c){ return parseInt((c.id||"").replace(/[^0-9]/g,""),10)||0; }
function unitOf(c){ const n=chNum(c); for(const u of UNITS){ if(n>=u.from&&n<=u.to) return u; } return {name:"기타", from:9990, to:9999}; }
function foldKey(name){ return "fc:fold:"+name; }
function isFolded(name){ return localStorage.getItem(foldKey(name))==="1"; }
function setFolded(name,v){ if(v) localStorage.setItem(foldKey(name),"1"); else localStorage.removeItem(foldKey(name)); }

/* ── 등급별 계산 (플랜용) ── */
const PLAN_GRADES=["S","A","B","C","기","인","소","Z"];
let qgrades={};   // chapterId -> { 문항no: 등급 }  (등급 필터 켤 때만 로드)
function planGradeSet(){
  const p=loadPlan();
  return (p&&Array.isArray(p.grades)&&p.grades.length)? new Set(p.grades) : null;  // null = 전체
}
async function ensureQGrades(){
  const miss=chapters.filter(c=>!qgrades[c.id]);
  await Promise.all(miss.map(async c=>{
    try{
      const r=await fetch(`chapters/${c.id}.json`);
      if(r.ok){ const d=await r.json(); const m={};
        (d.questions||[]).forEach(q=>{ m[q.no]=((q.grade||"").trim())||"-"; });
        qgrades[c.id]=m;
      } else qgrades[c.id]={};
    }catch(e){ qgrades[c.id]={}; }
  }));
}
function chCountP(c,gset){ if(!gset) return c.count||0; const g=c.grades||{}; let n=0; gset.forEach(k=>n+=(g[k]||0)); return n; }
function chSeenP(c,gset){
  const s=stat(c.id); if(!s||!s.qstat) return 0;
  if(!gset) return chSeen(c);
  const gm=qgrades[c.id]||{}; let n=0;
  for(const k in s.qstat){ const st=s.qstat[k]; if(st&&st.s>0 && gset.has(gm[k])) n++; }
  return Math.min(n, chCountP(c,gset));
}
function chDoneP(c,gset){ const t=chCountP(c,gset); return t>0 && chSeenP(c,gset)>=t; }

/* ── 오늘의 목표선 계산 ──
   플랜(N일 1회독) 기준으로, 오늘까지 끝내야 할 누적 목표 문항(targetQ)을 구하고
   챕터를 순서대로 누적해 "여기까지 하면 오늘 분량 완료"인 경계 챕터를 찾는다. */
function computeDailyTarget(){
  const p=loadPlan(); if(!p) return null;
  const gset=planGradeSet();
  const totalQ=chapters.reduce((s,c)=>s+chCountP(c,gset),0);
  if(!totalQ) return null;
  const start=new Date(p.start+"T00:00:00");
  const today=new Date(); today.setHours(0,0,0,0);
  const dayNum=Math.floor((today-start)/86400000)+1;
  const days=Math.max(1,p.days);
  const targetQ=Math.min(totalQ, Math.ceil(Math.min(Math.max(dayNum,1),days)/days*totalQ));
  let cum=0, boundaryId=null, boundaryQno=0;
  const dueSet=new Set();
  for(const c of chapters){
    const cnt=chCountP(c,gset); if(cnt<=0) continue;
    const s0=cum, e0=cum+cnt;
    if(s0 < targetQ){                       // 이 챕터 일부/전부가 오늘 목표 범위 안
      if(!chDoneP(c,gset)) dueSet.add(c.id); // 아직 안 끝낸 건 오늘까지 할 몫
      if(targetQ<=e0){ boundaryId=c.id; boundaryQno=targetQ-s0; } // 목표선이 이 챕터 안
    }
    cum=e0;
  }
  return {targetQ, totalQ, boundaryId, boundaryQno, dueSet, dayNum, days};
}
let dailyT=null;   // render 시 참조

/* 챕터 카드 1개 생성 (gset: 플랜의 계산 대상 등급, null=전체) */
function makeCard(c,gset){
  const s=stat(c.id);
  const done=chDoneP(c,gset), seen=chSeenP(c,gset), cnt=chCountP(c,gset);
  const isDue = dailyT && dailyT.dueSet.has(c.id);
  const isGoal = dailyT && dailyT.boundaryId===c.id;
  const a=document.createElement("a");
  a.className="ch"+(done?" done":"")+(isGoal&&!done?" goal":"");
  a.href=`app.html?ch=${c.id}`;
  let stats="";
  if(isGoal && !done) stats += `<span class="stat goal">🎯 오늘 목표선 ~${dailyT.boundaryQno}번</span>`;
  else if(isDue && !done) stats += `<span class="stat due">오늘까지</span>`;
  if(done) stats += `<span class="stat best">1회독 ✓</span>`;
  else if(seen>0) stats += `<span class="stat new">진도 ${seen}/${cnt}</span>`;
  if(s){
    if(s.rounds) stats += `<span class="stat">${s.rounds}회독</span><span class="stat best">최고 ${s.best}%</span>`;
    const weak = s.qstat ? Object.values(s.qstat).filter(x=>x.w>0).length : 0;
    if(weak) stats += `<span class="stat wrong">취약 ${weak}문항</span>`;
    if(s.prog && s.prog.nos && (s.prog.ans||[]).length < s.prog.nos.length)
      stats += `<span class="stat new">풀던 중 ${(s.prog.ans||[]).length}/${s.prog.nos.length}</span>`;
  }
  if(!stats) stats = `<span class="stat new">미학습</span>`;
  const lt = s && (s._at || s.when);
  if(lt){
    const d=new Date(lt), now=new Date();
    const ymd = d.getFullYear()!==now.getFullYear()
      ? `${String(d.getFullYear()).slice(2)}.${d.getMonth()+1}/${d.getDate()}`
      : `${d.getMonth()+1}/${d.getDate()}`;
    stats += `<span class="stat last">🕐 ${ymd}</span>`;
  }
  a.innerHTML=`<div class="row1"><span class="cid">${c.id.toUpperCase()}</span><span class="ctitle">${c.title}</span></div>
    <div class="row2"><span class="stat">${c.count}문항</span>${stats}</div>
    ${gradesHtml(c.grades)}`;
  return a;
}
function render(filter=""){
  dailyT=computeDailyTarget();
  const gset=planGradeSet();   // 완료 판정도 플랜의 계산 대상 등급과 동일하게
  const box=document.getElementById("list");
  box.innerHTML="";
  const f=filter.trim();
  const items=chapters.filter(c=>
    (!f || c.title.includes(f) || c.id.includes(f)) &&
    (!leftOnly || !chDoneP(c,gset)) &&
    (!goalOnly || (dailyT && dailyT.dueSet.has(c.id))) );
  if(!items.length){
    const msg = goalOnly ? "오늘 할 챕터를 모두 끝냈어요 🎉"
              : leftOnly ? "남은 챕터가 없습니다 🎉" : "검색 결과가 없습니다";
    box.innerHTML='<div class="empty">'+msg+'</div>'; return;
  }
  const searching = !!f;
  // 단원별 그룹핑
  const groups=UNITS.map(u=>({u, list:items.filter(c=>unitOf(c).name===u.name)})).filter(g=>g.list.length);
  const others=items.filter(c=>unitOf(c).name==="기타");
  if(others.length) groups.push({u:{name:"기타"}, list:others});
  for(const g of groups){
    const totalC=chapters.filter(c=>unitOf(c).name===g.u.name).length;
    const doneC=chapters.filter(c=>unitOf(c).name===g.u.name && chDoneP(c,gset)).length;
    const pct=totalC?Math.round(doneC/totalC*100):0;
    const collapsed = !searching && isFolded(g.u.name);
    const unit=document.createElement("div"); unit.className="unit";
    const head=document.createElement("div");
    head.className="uhead"+(collapsed?" collapsed":"");
    head.innerHTML=`<span class="uarrow">▼</span>
      <span class="uname">${g.u.name}</span>
      <span class="ubar"><i style="width:${pct}%"></i></span>
      <span class="ucount">${doneC}/${totalC}</span>`;
    const body=document.createElement("div");
    body.className="ubody"+(collapsed?" hide":"");
    for(const c of g.list) body.appendChild(makeCard(c,gset));
    head.onclick=()=>{
      const nowFold=!body.classList.contains("hide");
      body.classList.toggle("hide",nowFold);
      head.classList.toggle("collapsed",nowFold);
      setFolded(g.u.name, nowFold);
    };
    unit.appendChild(head); unit.appendChild(body);
    box.appendChild(unit);
  }
}
/* ── 클라우드 동기화 ── */
const DBURL="https://work-schedule-dash-4ceb2-default-rtdb.firebaseio.com";
function syncCode(){ return (localStorage.getItem("fc:synccode")||"").trim(); }
function updateSyncUI(){
  const c=syncCode(), el=document.getElementById("syncState"), btn=document.getElementById("syncBtn");
  if(c){ el.textContent="☁️ 동기화 켜짐 · 코드 "+c; el.classList.add("on"); btn.textContent="변경/끄기"; }
  else { el.textContent="☁️ 동기화 꺼짐"; el.classList.remove("on"); btn.textContent="코드 설정"; }
}
async function pullAll(){
  const c=syncCode(); if(!c) return;
  try{
    const r=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch.json`,{cache:"no-store"});
    if(!r.ok) return;
    const cloud=await r.json(); if(!cloud) return;
    for(const id of Object.keys(cloud)){
      const rec=cloud[id]; if(!rec) continue;
      const local=stat(id);
      if(!local || (rec._at||0) > (local._at||0)){
        try{ localStorage.setItem("fc:"+id, JSON.stringify(rec)); }catch(e){}
      }
    }
  }catch(e){}
  // 학습 플랜도 내려받기
  try{
    const rp=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{cache:"no-store"});
    if(rp.ok){ const cp=await rp.json(); const lp=loadPlan();
      if(cp && (cp._at||0) > ((lp&&lp._at)||0)) localStorage.setItem("fc:plan", JSON.stringify(cp)); }
  }catch(e){}
}
async function pushAll(){
  const c=syncCode(); if(!c) return;
  let cloud={};
  try{ const r=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch.json`,{cache:"no-store"}); if(r.ok) cloud=(await r.json())||{}; }catch(e){}
  for(const ch of chapters){
    const local=stat(ch.id); if(!local) continue;
    if(local._at==null){ local._at=Date.now(); try{ localStorage.setItem("fc:"+ch.id, JSON.stringify(local)); }catch(e){} }
    const cl=cloud[ch.id];
    if(!cl || (local._at||0) > (cl._at||0)){
      try{ await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/ch/${ch.id}.json`,{method:"PUT",body:JSON.stringify(local)}); }catch(e){}
    }
  }
  // 필터/학습모드 설정도 시딩
  try{
    const opt=JSON.parse(localStorage.getItem("fc:opts")||"null");
    if(opt){
      if(opt._at==null){ opt._at=Date.now(); localStorage.setItem("fc:opts", JSON.stringify(opt)); }
      let co=null;
      try{ const ro=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/opts.json`,{cache:"no-store"}); if(ro.ok) co=await ro.json(); }catch(e){}
      if(!co || (opt._at||0) > (co._at||0))
        await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/opts.json`,{method:"PUT",body:JSON.stringify(opt)});
    }
  }catch(e){}
  // 학습 플랜 시딩
  try{
    const p=loadPlan();
    if(p){
      if(p._at==null){ p._at=Date.now(); localStorage.setItem("fc:plan", JSON.stringify(p)); }
      let cp=null;
      try{ const rp=await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{cache:"no-store"}); if(rp.ok) cp=await rp.json(); }catch(e){}
      if(!cp || (p._at||0) > (cp._at||0))
        await fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{method:"PUT",body:JSON.stringify(p)});
    }
  }catch(e){}
}
function pushPlan(){
  const c=syncCode(); if(!c) return;
  const p=loadPlan(); if(!p) return;
  fetch(`${DBURL}/flashcards/${encodeURIComponent(c)}/plan.json`,{method:"PUT",body:JSON.stringify(p)}).catch(()=>{});
}
document.getElementById("syncBtn").onclick=async ()=>{
  const cur=syncCode();
  const v=prompt("기기 간 진도를 공유할 동기화 코드를 입력하세요.\n같은 코드를 쓰는 기기끼리 진도가 동기화됩니다.\n(끄려면 빈칸으로 두고 확인)", cur);
  if(v===null) return;
  const code=v.trim();
  if(code) localStorage.setItem("fc:synccode", code);
  else localStorage.removeItem("fc:synccode");
  updateSyncUI();
  if(code){
    document.getElementById("syncState").textContent="☁️ 동기화 중…";
    await pullAll();      // 다른 기기 진도 받기
    await pushAll();      // 이 기기 기존 진도 올리기
    updateSyncUI();
    render(document.getElementById("q").value);
  }
  alert(code? "동기화 켜짐. 다른 기기에서도 같은 코드 '"+code+"'를 입력하세요.":"동기화를 껐습니다.");
};

/* ── 학습 플랜 (N일 1회독) ── */
function loadPlan(){ try{ return JSON.parse(localStorage.getItem("fc:plan")||"null"); }catch(e){ return null; } }
function savePlan(p){ p._at=Date.now(); localStorage.setItem("fc:plan", JSON.stringify(p)); pushPlan(); }
function todayStr(){ const d=new Date(); d.setHours(0,0,0,0);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* ── 공부 시간대(intraday) 페이스 ──
   플랜(N일 1회독)의 오늘 몫을 설정한 시간대(예 09:00~18:00)에 균등 배분해서
   "지금 시각까지 여기까지 풀었어야 한다"는 누적 목표 문항·경계 챕터를 계산 */
function parseHM(s){ const m=/^(\d{1,2})(?::(\d{2}))?$/.exec((s||"").trim()); if(!m) return null;
  const h=+m[1], mi=m[2]?+m[2]:0; if(h>23||mi>59) return null; return h*60+mi; }
function fmtHM(t){ return `${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`; }
function setupTimeWindow(){
  const p=loadPlan(); if(!p){ alert("먼저 학습 플랜을 설정하세요."); return; }
  const cur=(p.tstart!=null&&p.tend!=null)?`${fmtHM(p.tstart)}-${fmtHM(p.tend)}`:"09:00-18:00";
  const v=prompt("오늘 공부할 시간대를 입력하세요.\n예: 09:00-18:00 또는 9-18\n(해제하려면 '없음' 입력)", cur);
  if(v===null) return;
  const s=(v||"").trim();
  if(s==="없음"||s===""){ delete p.tstart; delete p.tend; savePlan(p); renderPlan(); return; }
  const parts=s.split(/[-~]/);
  const a=parseHM(parts[0]), b=parseHM(parts[1]);
  if(a==null||b==null||b<=a){ alert("시간 형식을 확인하세요. 예: 09:00-18:00"); return; }
  p.tstart=a; p.tend=b; savePlan(p); renderPlan();
}
function computeTimeTarget(){
  const p=loadPlan(); if(!p||p.tstart==null||p.tend==null) return null;
  const gset=planGradeSet();
  const totalQ=chapters.reduce((s,c)=>s+chCountP(c,gset),0);
  if(!totalQ) return null;
  const start=new Date(p.start+"T00:00:00");
  const today=new Date(); today.setHours(0,0,0,0);
  const dayNum=Math.floor((today-start)/86400000)+1;
  const days=Math.max(1,p.days);
  const dn=Math.min(Math.max(dayNum,1),days);
  const targetToday=Math.min(totalQ, Math.ceil(dn/days*totalQ));
  const targetPrev=Math.min(totalQ, Math.ceil(Math.max(dn-1,0)/days*totalQ));
  const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
  let frac = nowMin<=p.tstart ? 0 : nowMin>=p.tend ? 1 : (nowMin-p.tstart)/(p.tend-p.tstart);
  const intra=Math.min(totalQ, Math.round(targetPrev + frac*(targetToday-targetPrev)));
  let cum=0, boundaryId=null, boundaryQno=0;
  for(const c of chapters){
    const cnt=chCountP(c,gset); if(cnt<=0) continue;
    const s0=cum, e0=cum+cnt;
    if(intra>s0 && intra<=e0){ boundaryId=c.id; boundaryQno=intra-s0; }
    cum=e0;
  }
  const seenQ=chapters.reduce((s,c)=>s+chSeenP(c,gset),0);
  return {intra, targetToday, targetPrev, seenQ, diff:seenQ-intra, nowMin,
          tstart:p.tstart, tend:p.tend, boundaryId, boundaryQno, done:seenQ>=totalQ};
}
function setupPlan(){
  const cur=loadPlan();
  const dv=prompt("며칠 안에 1회독을 끝낼까요? (일수)", cur?cur.days:"10");
  if(dv===null) return;
  const days=Math.max(1, parseInt(dv)||10);
  const start=(cur&&cur.start)?cur.start:todayStr();
  savePlan({start, days, grades: cur?cur.grades:undefined});
  renderPlan(); render(document.getElementById("q").value);
}
function resetPlanStart(){
  const cur=loadPlan(); if(!cur) return;
  if(!confirm("시작일을 오늘("+todayStr()+")로 다시 맞출까요?\n(진행 기록은 그대로 유지됩니다)")) return;
  savePlan({start:todayStr(), days:cur.days, grades:cur.grades});
  renderPlan(); render(document.getElementById("q").value);
}
/* 등급 선택 토글 → 플랜 재계산 */
async function togglePlanGrade(g){
  const p=loadPlan(); if(!p) return;
  let gs=Array.isArray(p.grades)?p.grades.slice():[];
  if(g==="ALL"){ gs=[]; }
  else if(gs.includes(g)){ gs=gs.filter(x=>x!==g); }
  else { gs.push(g); }
  savePlan({start:p.start, days:p.days, grades: gs.length?gs:undefined});
  if(gs.length) await ensureQGrades();
  renderPlan();
}
function renderPlan(){
  const card=document.getElementById("planCard"); if(!card) return;
  card.style.display="block";
  const p=loadPlan();
  if(!p){
    card.innerHTML=`<div class="ph">🎯 학습 플랜</div>
      <div class="pmsg">며칠 안에 1회독을 끝낼지 목표를 정하면, 진행률·남은 챕터·하루 권장량을 자동으로 관리해드려요.</div>
      <button class="pbtn" id="planSet">플랜 시작</button>`;
    document.getElementById("planSet").onclick=setupPlan; return;
  }
  const gset=planGradeSet();  // null = 전체 등급
  const T=chapters.filter(c=>chCountP(c,gset)>0).length;
  const D=chapters.filter(c=>chDoneP(c,gset)).length;
  // 문항 기준 페이스 (등급 지정 시 해당 등급 문항만 집계)
  const totalQ=chapters.reduce((s,c)=>s+chCountP(c,gset),0);
  const seenQ=chapters.reduce((s,c)=>s+chSeenP(c,gset),0);
  const remainQ=Math.max(0, totalQ-seenQ);
  const pct=totalQ?Math.round(seenQ/totalQ*100):0;
  const start=new Date(p.start+"T00:00:00");
  const today=new Date(); today.setHours(0,0,0,0);
  const dayNum=Math.floor((today-start)/86400000)+1;   // 1일차부터
  const days=p.days;
  const dayShown=Math.min(Math.max(dayNum,1),days);
  const daysLeft=Math.max(0, days-(dayNum-1));          // 오늘 포함 남은 일수
  const end=new Date(start.getTime()+(days-1)*86400000);
  const endStr=`${end.getMonth()+1}/${end.getDate()}`;
  const targetQ=Math.min(totalQ, Math.ceil(Math.min(Math.max(dayNum,1),days)/days*totalQ));
  const behindQ=Math.max(0, targetQ-seenQ);
  const aheadQ=Math.max(0, seenQ-targetQ);
  const perDayQ=daysLeft>0?Math.ceil(remainQ/daysLeft):remainQ;
  const overdue = dayNum>days;

  let badges="";
  if(seenQ>=totalQ) badges=`<span class="pb ok">🎉 1회독 완료!</span>`;
  else if(overdue) badges=`<span class="pb bad">기한 초과 · 남은 ${remainQ}문항</span>`;
  else if(behindQ>0) badges=`<span class="pb bad">⚠️ ${behindQ}문항 뒤처짐</span>`;
  else badges=`<span class="pb ok">✅ 순조${aheadQ>0?` (${aheadQ}문항 앞섬)`:""}</span>`;
  if(seenQ<totalQ && !overdue) badges+=`<span class="pb info">오늘까지 목표 ${targetQ}문항</span>`;
  if(seenQ<totalQ) badges+=`<span class="pb ${daysLeft<=1&&remainQ>0?"warn":"info"}">하루 ${perDayQ}문항 권장</span>`;
  // 오늘 목표선(경계 챕터) 안내
  const dt=computeDailyTarget();
  if(dt && dt.boundaryId && seenQ<totalQ){
    badges+=`<span class="pb warn">📍 오늘은 ${dt.boundaryId.toUpperCase()}의 ${dt.boundaryQno}번까지</span>`;
  }

  const gsel=gset||new Set();
  const allOn=!gset;
  const present=new Set();
  chapters.forEach(c=>Object.keys(c.grades||{}).forEach(k=>{ if((c.grades[k]||0)>0) present.add(k); }));
  const chipGrades=PLAN_GRADES.filter(g=>present.has(g));
  const gchips=`<span class="pgc${allOn?" on":""}" data-g="ALL" style="--pgc:#3A4553">전체</span>`+
    chipGrades.map(g=>`<span class="pgc${gsel.has(g)?" on":""}" data-g="${g}" style="--pgc:${GC[g]||'#7F7F7F'}">${g}</span>`).join("");
  const scope = gset? `${[...gset].join("·")} 등급` : "전체 등급";

  // 공부 시간대 기준 실시간 페이스
  const tt=computeTimeTarget();
  let timeHtml="";
  if(tt){
    const win=`${fmtHM(tt.tstart)}~${fmtHM(tt.tend)}`, nowStr=fmtHM(tt.nowMin);
    if(tt.done){
      timeHtml=`<div class="ptime ok">⏰ ${win} · 🎉 1회독을 이미 끝냈어요</div>`;
    } else if(tt.nowMin < tt.tstart){
      timeHtml=`<div class="ptime">⏰ ${win} · 아직 시작 전 · 오늘 목표까지 <b>${Math.max(0,tt.targetToday-tt.seenQ)}문항</b></div>`;
    } else {
      const behind=tt.diff<0?-tt.diff:0, ahead=tt.diff>0?tt.diff:0;
      const okNow=tt.seenQ>=tt.intra;
      const loc=tt.boundaryId?`${tt.boundaryId.toUpperCase()}의 ${tt.boundaryQno}번`:`${tt.intra}문항`;
      const status=okNow?`✅ 페이스 유지${ahead?` (+${ahead}문항 앞섬)`:""}`:`⚠️ ${behind}문항 뒤처짐`;
      timeHtml=`<div class="ptime ${okNow?'ok':'bad'}">⏰ <b>${nowStr}</b> 기준 — 여기까진 풀었어야: <b>${loc}까지</b>
        <span class="sub">누적 목표 ${tt.intra}문항 · 현재 ${tt.seenQ}문항 · ${status} (${win})</span></div>`;
    }
  }

  card.innerHTML=`
    <div class="ph">🎯 학습 플랜
      <span class="pedit">
        <button id="planTime">⏰ 시간대</button>
        <button id="planEdit">설정</button>
        <button id="planReset">오늘부터</button>
      </span>
    </div>
    <div class="pgwrap">
      <div class="pglab">계산 대상 등급 (선택 안 하면 전체) · 현재: ${scope}</div>
      <div class="pgchips" id="pgChips">${gchips}</div>
    </div>
    <div class="pbig">
      <span>진도 <b>${seenQ}/${totalQ}</b>문항 · <b>${pct}%</b></span>
      <span style="color:var(--muted)">완료 ${D}/${T}챕터</span>
      <span>${overdue?`<b style="color:#C62828">기한 초과</b>`:`<b>${dayShown}</b>일차 / 목표 ${days}일 (D-${daysLeft})`}</span>
      <span style="color:var(--muted)">종료 예정 ${endStr}</span>
    </div>
    <div class="pbar"><i style="width:${pct}%"></i></div>
    <div class="pbadges">${badges}</div>
    ${timeHtml}`;
  document.getElementById("planTime").onclick=setupTimeWindow;
  document.getElementById("planEdit").onclick=setupPlan;
  document.getElementById("planReset").onclick=resetPlanStart;
  card.querySelectorAll("#pgChips .pgc").forEach(el=>{
    el.onclick=()=>togglePlanGrade(el.dataset.g);
  });
}

document.getElementById("leftBtn").onclick=()=>{
  leftOnly=!leftOnly;
  document.getElementById("leftBtn").classList.toggle("on",leftOnly);
  render(document.getElementById("q").value);
};
/* 오늘 목표만 보기 */
document.getElementById("goalBtn").onclick=()=>{
  if(!computeDailyTarget()){ alert("먼저 학습 플랜을 설정하세요.\n(위 '🎯 학습 플랜' → 플랜 시작)"); return; }
  goalOnly=!goalOnly;
  document.getElementById("goalBtn").classList.toggle("on",goalOnly);
  render(document.getElementById("q").value);
};
/* 단원 전체 접기/펴기 토글 */
document.getElementById("foldBtn").onclick=()=>{
  const anyOpen=UNITS.some(u=>!isFolded(u.name));
  UNITS.forEach(u=>setFolded(u.name, anyOpen));  // 하나라도 열려있으면 전부 접기
  render(document.getElementById("q").value);
};
/* 진도 초기화 (전체 / 특정 챕터) */
async function resetProgress(){
  const v=prompt("진도를 초기화합니다.\n\n· 전체 초기화: all 입력\n· 특정 챕터: 챕터번호 입력 (예: 3 또는 03)\n\n(취소하려면 빈칸)","");
  if(v===null) return;
  const s=(v||"").trim().toLowerCase();
  if(!s) return;
  const code=syncCode();
  if(s==="all"||s==="전체"){
    if(!confirm("정말 모든 챕터의 진도·회독·취약 기록을 초기화할까요?\n되돌릴 수 없습니다.")) return;
    for(const c of chapters) localStorage.removeItem("fc:"+c.id);
    if(code){ try{ await fetch(`${DBURL}/flashcards/${encodeURIComponent(code)}/ch.json`,{method:"PUT",body:"null"}); }catch(e){} }
    alert("전체 진도를 초기화했습니다.");
  } else {
    const num=s.replace(/[^0-9]/g,"");
    if(!num){ alert("챕터번호를 인식하지 못했습니다."); return; }
    const id="ch"+num.padStart(2,"0");
    const c=chapters.find(x=>x.id===id);
    if(!c){ alert("그런 챕터가 없습니다: "+id); return; }
    if(!confirm(`'${c.title}' 진도를 초기화할까요?`)) return;
    localStorage.removeItem("fc:"+id);
    if(code){ try{ await fetch(`${DBURL}/flashcards/${encodeURIComponent(code)}/ch/${id}.json`,{method:"PUT",body:"null"}); }catch(e){} }
    alert(`${id.toUpperCase()} 진도를 초기화했습니다.`);
  }
  renderPlan();
  render(document.getElementById("q").value);
}
document.getElementById("resetBtn").onclick=resetProgress;

fetch("data/manifest.json").then(r=>r.json()).then(async d=>{
  chapters=d.chapters;
  updateSyncUI();
  await pullAll();  // 다른 기기 진도 먼저 반영
  const studied=chapters.filter(c=>stat(c.id)).length;
  document.getElementById("summary").textContent=`전체 ${chapters.length}챕터 · 학습 시작 ${studied}챕터`;
  if(planGradeSet()) await ensureQGrades();  // 등급 지정 플랜이면 문항 등급 로드
  renderPlan();
  render();
});
document.getElementById("q").addEventListener("input",e=>render(e.target.value));
/* 공부 시간대 페이스는 시각에 따라 바뀌므로 1분마다 갱신 */
setInterval(()=>{ const p=loadPlan(); if(p&&p.tstart!=null&&p.tend!=null&&document.getElementById("planCard")) renderPlan(); }, 60000);
</script>
